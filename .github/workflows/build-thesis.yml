name: Build thesis PDF

on:
  push:
    branches: [thesis-pdf-ci]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TeX Live, Times New Roman and biber
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo add-apt-repository -y multiverse
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended texlive-bibtex-extra texlive-science \
            texlive-pictures texlive-plain-generic biber latexmk \
            ttf-mscorefonts-installer fontconfig
          sudo fc-cache -f
          echo "=== versions ==="
          xelatex --version | head -1 || true
          biber --version || true

      - name: Compile thesis (explicit XeLaTeX + biber)
        working-directory: docs/thesis/latex
        continue-on-error: true
        run: |
          set +e
          xelatex -interaction=nonstopmode -file-line-error main.tex > build1.txt 2>&1; echo "xelatex#1 exit=$?"
          biber main > biber.txt 2>&1; echo "biber exit=$?"
          xelatex -interaction=nonstopmode -file-line-error main.tex > build2.txt 2>&1; echo "xelatex#2 exit=$?"
          xelatex -interaction=nonstopmode -file-line-error main.tex > build3.txt 2>&1; echo "xelatex#3 exit=$?"
          echo "=== dir listing ==="
          ls -la

      - name: Assemble build log
        if: always()
        working-directory: docs/thesis/latex
        run: |
          {
            echo "############ BIBER OUTPUT ############"
            cat biber.txt 2>/dev/null || echo "(no biber.txt)"
            echo
            echo "############ LAST XELATEX (tail of build3) ############"
            tail -n 80 build3.txt 2>/dev/null || echo "(no build3.txt)"
            echo
            echo "############ DIR ############"
            ls -la
          } > thesis-build.log
          if [ -f main.pdf ]; then echo "PDF OK: $(stat -c%s main.pdf) bytes"; else echo "PDF MISSING"; fi

      - name: Commit results back to branch
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f docs/thesis/latex/thesis-build.log
          if [ -f docs/thesis/latex/main.pdf ]; then git add -f docs/thesis/latex/main.pdf; fi
          git commit -m "ci: thesis build output [skip ci]" || echo "nothing to commit"
          git push origin HEAD:thesis-pdf-ci

      - name: Mark job failed if PDF missing
        if: always()
        run: test -f docs/thesis/latex/main.pdf
